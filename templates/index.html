<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSP Image Compression Dashboard</title>
    <!-- Main Css File  -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
     <!-- Font Awesome library-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1><i class="fas fa-microchip"></i> Image Compression Project</h1>
        </header>

        <!-- section upload file-->
        <section class="upload-section">
            <form method="POST" enctype="multipart/form-data">
                <div class="file-input-wrapper">
                    <input type="file" name="image" id="fileInput" required>
                </div>
                <button type="submit" class="glow-button">
                    <i class="fas fa-bolt"></i> Compress Now
                </button>
            </form>
        </section>

        {% if orig_img %}
        <!-- section compare image-->
        <section class="results-grid">
            <div class="image-card">
                <h3><i class="fas fa-image"></i> Original Image</h3>
                <div class="img-wrapper">
                    <img src="{{ url_for('static', filename=orig_img) }}" alt="Original">
                </div>
                <p class="size-tag">Size: {{ orig_size }} KB</p>
            </div>

            <div class="image-card highlight">
                <h3><i class="fas fa-file-contract"></i> Compressed Image</h3>
                <div class="img-wrapper">
                    <img src="{{ url_for('static', filename=comp_img) }}" alt="Compressed">
                </div>
                <p class="size-tag">Size: {{ comp_size }} KB</p>
            </div>
        </section>

        <!-- section statices-->
        <section class="metrics-container">
            <div class="metric-item">
                <span><i class="fas fa-database"></i> Saved Space</span>
                <strong>{{ saved }} KB</strong>
            </div>
            <div class="metric-item">
                <span><i class="fas fa-chart-pie"></i> Compression Ratio</span>
                <strong>{{ ratio }}%</strong>
            </div>
            <div class="metric-item">
                <span><i class="fas fa-tachometer-alt"></i> PSNR Quality</span>
                <strong>{{ psnr }} dB</strong>
            </div>
        </section>
        {% endif %}
    </div>

</body>
</html>
